<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;

        --accent: #10b981;
        --text: #f8fafc;
        --text-dim: #94a3b8;
        --border: #334155;
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        overflow-x: hidden;
    }

    .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 16px;
        box-sizing: border-box;
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
    }

    .logo-icon {
        background: var(--primary);
        color: white;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
    }

    h1 {
        font-size: 1.2rem;
        margin: 0;
        flex-grow: 1;
        margin-left: 12px;
    }

    .credit-badge {
        background: rgba(139, 92, 246, 0.1);
        border: 1px solid var(--primary);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        color: var(--primary);
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
    }

    h3 {
        margin-top: 0;
        font-size: 0.9rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 12px;
    }

    textarea {
        width: 100%;
        height: 120px;
        background: #0f172a;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 12px;
        box-sizing: border-box;
        resize: none;
        font-family: inherit;
        font-size: 0.9rem;
    }

    textarea:focus {
        outline: none;
        border-color: var(--primary);
    }

    .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }

    .primary-btn {
        background: var(--primary);
        color: white;
    }

    .primary-btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }

    .secondary-btn {
        background: var(--accent);
        color: white;
    }

    .secondary-btn:hover {
        background: #059669;
    }

    .preview-card {
        border-color: var(--accent);
    }

    .scroll-table {
        overflow-x: auto;
        max-height: 200px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
    }

    td {
        border: 1px solid var(--border);
        padding: 8px;
        white-space: nowrap;
    }

    #status-msg {
        text-align: center;
        margin-top: 15px;
        font-size: 0.85rem;
        min-height: 1.2rem;
    }

    .success {
        color: var(--accent);
    }

    .error {
        color: #f43f5e;
    }

    .info {
        color: var(--primary);
    }

    footer {
        margin-top: auto;
        padding-top: 20px;
        display: flex;
        justify-content: space-between;
        font-size: 0.7rem;
        color: var(--text-dim);
